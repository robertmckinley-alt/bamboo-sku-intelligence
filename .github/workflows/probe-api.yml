name: API Probe (one-shot)

# Pushed to verify whether facts.client_product_sales is live in the API.
# Triggers only when this file is touched, so it doesn't fire on unrelated pushes.

on:
  push:
    paths:
      - '.github/workflows/probe-api.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: probe-api
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch live API and write probe result
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os
          req = urllib.request.Request(
              'https://api-intelligence.getbamboo.com/api/reports',
              headers={'User-Agent': 'bamboo-api-probe/1.0'})
          with urllib.request.urlopen(req, timeout=60) as r:
              d = json.loads(r.read())
          facts = d.get('facts', {})
          out = {
              'generated_at': d.get('generated_at'),
              'fact_keys': list(facts.keys()),
              'has_client_product_sales': 'client_product_sales' in facts,
          }
          cps = facts.get('client_product_sales')
          if cps:
              out['cps_keys'] = list(cps.keys())
              out['cps_row_dim'] = cps.get('row_dim')
              out['cps_col_dim'] = cps.get('col_dim')
              out['cps_shape'] = cps.get('shape')
              out['cps_row_len'] = len(cps.get('row', []))
              out['cps_revenue_sum_cents'] = sum(cps.get('revenue_cents', []) or [])
              out['cps_units_sum'] = sum(cps.get('units', []) or [])
              out['cps_sample'] = {
                  'row': (cps.get('row', []) or [])[:5],
                  'col': (cps.get('col', []) or [])[:5],
                  'revenue_cents': (cps.get('revenue_cents', []) or [])[:5],
                  'units': (cps.get('units', []) or [])[:5],
                  'last_ordered_at_utc': (cps.get('last_ordered_at_utc', []) or [])[:5],
              }
          os.makedirs('data', exist_ok=True)
          with open('data/api-probe.json', 'w') as f:
              json.dump(out, f, indent=2)
          print(json.dumps(out, indent=2))
          PYEOF

      - name: Commit probe result
        run: |
          git config user.email "bot@bamboo-probe"
          git config user.name "Bamboo API Probe"
          git add data/api-probe.json
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "API probe: fact list as of $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
