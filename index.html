<style>
  :root {
    /* INK — cool, deep slate */
    --ink-950: #0b1220;
    --ink-900: #111827;
    --ink-800: #1f2937;
    --ink-700: #374151;
    --ink-600: #4b5563;
    --ink-500: #6b7280;
    --ink-400: #9ca3af;
    --ink-300: #d1d5db;
    --ink-200: #e5e7eb;
    --ink-100: #f3f4f6;
    --ink-50:  #f8fafc;

    /* EMERALD — primary accent */
    --em-700: #047857;
    --em-600: #059669;
    --em-500: #10b981;
    --em-400: #34d399;
    --em-200: #a7f3d0;
    --em-100: #d1fae5;
    --em-50:  #ecfdf5;

    /* SEMANTIC */
    --pos: #059669;
    --warn: #d97706;
    --alert: #dc2626;
    --info: #2563eb;

    --canvas: #f5f6f8;
    --paper: #ffffff;
    --line: #e5e7eb;
    --line-soft: #eef0f3;
  }
  html, body, #root { background: var(--canvas); color: var(--ink-900); }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .font-display { font-family: "Fraunces", "Source Serif Pro", Georgia, serif; font-feature-settings: "ss01", "ss02"; letter-spacing: -0.01em; }
  .font-mono, .tabular-nums {
    font-family: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
  }
  .small-caps { font-variant: small-caps; letter-spacing: 0.08em; text-transform: lowercase; }

  /* Background — subtle paper grain */
  .canvas-grain {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(15, 23, 42, 0.035) 1px, transparent 0);
    background-size: 24px 24px;
  }

  /* Score / opportunity gradients */
  .score-grad-high { background: linear-gradient(90deg, #34d399 0%, #059669 100%); }
  .score-grad-mid  { background: linear-gradient(90deg, #fbbf24 0%, #d97706 100%); }
  .score-grad-low  { background: linear-gradient(90deg, #f87171 0%, #dc2626 100%); }
  .ink-grad        { background: linear-gradient(135deg, #1f2937 0%, #0b1220 100%); }
  .emerald-grad    { background: linear-gradient(135deg, #059669 0%, #047857 100%); }

  /* Range slider */
  input[type=range] { -webkit-appearance: none; height: 4px; background: linear-gradient(90deg, var(--em-500), var(--em-700)); border-radius: 999px; }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: white; border: 2px solid var(--ink-900);
    box-shadow: 0 1px 3px rgba(0,0,0,.18);
    cursor: grab; margin-top: -5px;
  }
  input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.1); }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%; background: white; border: 2px solid var(--ink-900);
    box-shadow: 0 1px 3px rgba(0,0,0,.18); cursor: grab;
  }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; transition: all .12s ease; border: 1px solid transparent; white-space: nowrap; }
  .btn:active { transform: translateY(0.5px); }
  .btn-primary { background: var(--ink-900); color: white; border-color: var(--ink-900); }
  .btn-primary:hover { background: var(--ink-800); box-shadow: 0 1px 0 rgba(255,255,255,.05) inset, 0 2px 6px rgba(11,18,32,.18); }
  .btn-emerald { background: linear-gradient(135deg, var(--em-600), var(--em-700)); color: white; border-color: var(--em-700); }
  .btn-emerald:hover { box-shadow: 0 2px 8px rgba(5,150,105,.28), 0 1px 0 rgba(255,255,255,.18) inset; }
  .btn-ghost   { background: white; color: var(--ink-700); border-color: var(--ink-200); }
  .btn-ghost:hover { background: var(--ink-50); border-color: var(--ink-300); }
  .btn-soft    { background: var(--ink-100); color: var(--ink-800); }
  .btn-soft:hover { background: var(--ink-200); }
  .btn:focus-visible { outline: 2px solid var(--em-500); outline-offset: 2px; }
  .btn[disabled], .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Tags */
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 1px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; height: 20px; line-height: 1; border: 1px solid transparent; letter-spacing: 0.02em; white-space: nowrap; box-shadow: inset 0 0 0 1px rgba(255,255,255,.4); }
  .pill .dot { width: 5px; height: 5px; border-radius: 50%; box-shadow: 0 0 0 2px rgba(255,255,255,.5); }
  .pill-lg { height: 24px; padding: 1px 10px; font-size: 11px; }

  /* Tables */
  table.dt { border-collapse: separate; border-spacing: 0; width: 100%; }
  table.dt th { position: sticky; top: 0; background: var(--ink-50); border-bottom: 1px solid var(--ink-200); padding: 7px 8px; font-size: 10px; font-weight: 600; color: var(--ink-600); text-transform: uppercase; letter-spacing: 0.05em; user-select: none; z-index: 5; }
  table.dt th.sortable { cursor: pointer; }
  table.dt th.sortable:hover { background: var(--ink-100); color: var(--ink-900); }
  table.dt tbody tr { background: white; }
  table.dt tbody tr:nth-child(even) { background: #fafbfc; }
  table.dt tbody tr:hover { background: #ecfdf5; }
  table.dt tbody tr.selected { background: #d1fae5 !important; outline: 1px solid var(--em-500); outline-offset: -1px; }
  table.dt td { padding: 6px 8px; border-bottom: 1px solid var(--line-soft); font-size: 11px; color: var(--ink-800); }

  /* Heatmap cells — hover highlight is non-layout (outline + box-shadow only).
     Do NOT use transform/scale here: it changes the cell's bounding box and
     causes a mouseenter/mouseleave oscillation as the cell pops out from
     under the cursor. */
  .hm-cell { transition: box-shadow .08s ease, outline-color .08s ease; }
  .hm-cell:hover { outline: 2px solid var(--ink-900); outline-offset: -1px; box-shadow: 0 0 0 1px rgba(11,18,32,.4); z-index: 3; }

  /* Drawer animations */
  @keyframes drawerIn { from { transform: translateX(20px); opacity: .4; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .drawer-anim { animation: drawerIn .22s ease-out; }
  .backdrop-anim { animation: fadeIn .15s ease-out; }

  /* Skeleton shimmer */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .shimmer { background: linear-gradient(90deg, #eef0f3 0%, #f8fafc 50%, #eef0f3 100%); background-size: 800px 100%; animation: shimmer 1.4s ease-in-out infinite; border-radius: 4px; }

  /* Print */
  @media print {
    .no-print, header.appbar, aside.rail { display: none !important; }
    body, html { background: white !important; }
    @page { margin: 0.5in; size: letter; }
    .drawer-overlay { position: static !important; background: white !important; backdrop-filter: none !important; }
    .drawer-overlay > div { width: 100% !important; max-width: 100% !important; box-shadow: none !important; height: auto !important; max-height: none !important; }
  }

  /* Focus rings */
  button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--em-500); outline-offset: 1px;
  }
  input[type="text"], input[type="search"], select {
    background: white; border: 1px solid var(--ink-200); border-radius: 6px; padding: 5px 9px; font-size: 12px;
    transition: border-color .1s, box-shadow .1s;
  }
  input[type="text"]:focus, input[type="search"]:focus, select:focus {
    border-color: var(--em-500); box-shadow: 0 0 0 3px rgba(16,185,129,.12); outline: none;
  }

  /* Custom scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; background-clip: padding-box; border: 2px solid transparent; }

  /* Responsive: stack rail under main below 1280px */
  @media (max-width: 1279px) {
    .rail-stack { width: 100% !important; border-left: none !important; border-top: 1px solid var(--line); }
    .main-stack { flex-direction: column !important; }
  }

  /* Sparkline polish */
  .spark path { stroke-linejoin: round; stroke-linecap: round; }

  /* Sticky 1st cell in matrix */
  .matrix-axis { position: sticky; left: 0; z-index: 4; background: white; }
  .matrix-axis::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: linear-gradient(90deg, rgba(15,23,42,.06), transparent); pointer-events: none; }

  /* Subtle dividers */
  .v-divider { width: 1px; background: var(--line); }
  .h-divider { height: 1px; background: var(--line); }
</style>
